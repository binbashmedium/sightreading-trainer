<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; background: white; overflow: hidden; }
    #output { width: 100%; }
    /* svgViewBox:true makes Verovio emit a viewBox, so width:100% scales content responsively */
    #output svg { width: 100%; height: auto; display: block; }
  </style>
</head>
<body>
  <div id="output"></div>
  <script src="verovio-toolkit-wasm.js"></script>
  <script>
    var vrvToolkit = null;
    var pendingCall = null;

    verovio.module.onRuntimeInitialized = function () {
      vrvToolkit = new verovio.toolkit();
      if (pendingCall) {
        pendingCall();
        pendingCall = null;
      }
    };

    function doRender(meiData, showCursor) {
      vrvToolkit.setOptions({
        svgViewBox: true,        // Verovio emits viewBox → width:100% scales content responsively
        adjustPageWidth: true,   // SVG width matches content exactly (no trailing whitespace)
        breaks: "none",          // All measures on one system, no line breaks
        header: "none",
        footer: "none",
        scale: 35,
        spacingSystem: 4,
        spacingStaff: 8
      });
      vrvToolkit.loadData(meiData);
      document.getElementById('output').innerHTML = vrvToolkit.renderToSVG(1);
      constrainSvgHeight();
      if (showCursor) {
        drawCursor();
      }
    }

    /**
     * If the SVG at 100% width would be taller than the viewport, scale it down
     * proportionally so both staves remain visible (portrait-row constraint).
     * With svgViewBox:true, viewBox.baseVal is reliable for aspect-ratio calculation.
     */
    function constrainSvgHeight() {
      var svgEl = document.querySelector('#output svg');
      if (!svgEl) return;

      var vb = svgEl.viewBox.baseVal;
      if (!vb || vb.width <= 0 || vb.height <= 0) return;

      var aspect = vb.width / vb.height;
      var cw = window.innerWidth;
      var ch = window.innerHeight;
      var heightAtFullWidth = cw / aspect;

      if (heightAtFullWidth > ch) {
        // Too tall: reduce width so height == viewport height
        svgEl.style.width = (ch * aspect) + 'px';
      }
      // else: stays at width:100% from CSS
    }

    function renderMei(meiData, showCursor) {
      if (vrvToolkit) {
        doRender(meiData, showCursor);
      } else {
        pendingCall = function () { doRender(meiData, showCursor); };
      }
    }

    function drawCursor() {
      var existing = document.getElementById('beat-cursor');
      if (existing) existing.remove();

      var svgEl = document.querySelector('#output svg');
      if (!svgEl) return;

      var els = [];
      svgEl.querySelectorAll('[id^="ncurr"]').forEach(function (el) { els.push(el); });
      if (els.length === 0) return;

      var svgRect = svgEl.getBoundingClientRect();
      if (svgRect.width === 0) return;
      var viewBox = svgEl.viewBox.baseVal;
      var scaleX = viewBox.width > 0 ? viewBox.width / svgRect.width : 1;

      var minX = Infinity;
      els.forEach(function (el) {
        var bbox = el.getBoundingClientRect();
        var x = (bbox.left - svgRect.left) * scaleX + viewBox.x;
        if (x < minX) minX = x;
      });

      if (!isFinite(minX)) return;

      var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('id', 'beat-cursor');
      line.setAttribute('x1', minX);
      line.setAttribute('y1', viewBox.y);
      line.setAttribute('x2', minX);
      line.setAttribute('y2', viewBox.y + viewBox.height);
      line.setAttribute('stroke', 'rgba(220,0,0,0.85)');
      // stroke-width is in viewBox units; use ~0.5% of viewBox width for a thin line
      var strokeW = Math.max(2, viewBox.width * 0.005);
      line.setAttribute('stroke-width', strokeW);
      svgEl.appendChild(line);
    }
  </script>
</body>
</html>
