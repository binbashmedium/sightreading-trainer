name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Override Java home for Gradle
        run: echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties

      - name: Run domain unit tests
        run: ./gradlew :domain:test --no-daemon

      - name: Run app unit tests
        run: ./gradlew :app:test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            domain/build/reports/tests/
            app/build/reports/tests/
          retention-days: 14

  build-debug:
    name: Build debug APK
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Override Java home for Gradle
        run: echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload debug APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  release-bundle:
    name: Build release AAB (upload on release)
    if: github.event_name == 'release' || github.event_name == 'pull_request' || github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Override Java home for Gradle
        run: echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties

      - name: Restore upload keystore from Base64 secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Missing required secret: KEYSTORE_BASE64" >&2
            exit 1
          fi
          python - <<'PY'
          import base64
          import binascii
          import os
          import pathlib
          import re
          import sys

          raw = os.environ["KEYSTORE_BASE64"]
          cleaned = re.sub(r"\s+", "", raw)
          try:
              decoded = base64.b64decode(cleaned, validate=False)
          except binascii.Error as exc:
              print(f"Invalid KEYSTORE_BASE64: {exc}", file=sys.stderr)
              sys.exit(1)
          if not decoded:
              print("Decoded keystore is empty", file=sys.stderr)
              sys.exit(1)
          pathlib.Path("/tmp/upload-keystore.jks").write_bytes(decoded)
          PY
          keytool -list -keystore /tmp/upload-keystore.jks -storepass "${{ secrets.KEYSTORE_PASSWORD }}" >/dev/null

      - name: Build release app bundle
        env:
          KEYSTORE_PATH: /tmp/upload-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease --no-daemon

      - name: Upload AAB to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/bundle/release/app-release.aab
