name: CI

permissions:
  contents: read

on:
  push:
    branches: ["**"]
  pull_request:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 – build
#   • Run all unit tests
#   • Compile debug APK + debug test APK (used by the emulator job)
#   • On release: also compile the signed release AAB
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Override Java home for Gradle
        run: echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties

      # ── Unit tests ──────────────────────────────────────────────────────────
      - name: Run unit tests (domain + app)
        run: ./gradlew :domain:test :app:test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            domain/build/reports/tests/
            app/build/reports/tests/
          retention-days: 14

      # ── Debug APKs ──────────────────────────────────────────────────────────
      - name: Build debug APK + test APK
        run: ./gradlew :app:assembleDebug :app:assembleDebugAndroidTest --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload debug test APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-androidTest
          path: app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk
          retention-days: 14

      # ── Release AAB (only when a GitHub release is published) ───────────────
      - name: Restore upload keystore from Base64 secret
        if: github.event_name == 'release'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Missing required secret: KEYSTORE_BASE64" >&2; exit 1
          fi
          if [ -z "$KEYSTORE_PASSWORD" ]; then
            echo "Missing required secret: KEYSTORE_PASSWORD" >&2; exit 1
          fi
          if [ -z "$KEY_ALIAS" ]; then
            echo "Missing required secret: KEY_ALIAS" >&2; exit 1
          fi
          python - <<'PY'
          import base64, binascii, os, pathlib, re, sys
          raw = os.environ["KEYSTORE_BASE64"]
          cleaned = re.sub(r"\s+", "", raw)
          try:
              decoded = base64.b64decode(cleaned, validate=False)
          except binascii.Error as exc:
              print(f"Invalid KEYSTORE_BASE64: {exc}", file=sys.stderr); sys.exit(1)
          if not decoded:
              print("Decoded keystore is empty", file=sys.stderr); sys.exit(1)
          pathlib.Path("/tmp/upload-keystore.jks").write_bytes(decoded)
          PY
          keytool -list -keystore /tmp/upload-keystore.jks -storepass "$KEYSTORE_PASSWORD" >/dev/null
          if ! keytool -list -keystore /tmp/upload-keystore.jks \
               -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" >/dev/null 2>&1; then
            echo "Key alias '$KEY_ALIAS' not found. Available:" >&2
            keytool -list -keystore /tmp/upload-keystore.jks -storepass "$KEYSTORE_PASSWORD" >&2
            exit 1
          fi

      - name: Build release app bundle
        if: github.event_name == 'release'
        env:
          KEYSTORE_PATH: /tmp/upload-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease --no-daemon

      - name: Upload release AAB
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 14

# ─────────────────────────────────────────────────────────────────────────────
# Stage 2 – parallel (both jobs start as soon as build finishes)
# ─────────────────────────────────────────────────────────────────────────────

  practice-screenshot:
    name: Capture Practice Screen screenshot (emulator)
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true  # emulator flakiness must not block the release
    steps:
      - name: Download app APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug
          path: apks

      - name: Download test APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug-androidTest
          path: apks

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run practice screenshot test on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          # API 34 ships with a modern Chromium-based WebView that has a full
          # V8 JIT compiler — required for the Verovio 6.7 MB WASM bundle.
          # API 29 AOSP WebView lacks a JIT and silently stalls on WASM init.
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_5
          disable-animations: true
          script: |
            adb install -r apks/app-debug.apk
            adb install -r apks/app-debug-androidTest.apk
            adb shell am instrument -w \
              -e class com.binbashmedium.sightreadingtrainer.ui.PracticeScreenshotTest \
              com.binbashmedium.sightreadingtrainer.test/androidx.test.runner.AndroidJUnitRunner
            adb pull /sdcard/practice_screen.png practice_screen.png

      - name: Upload practice screenshot
        uses: actions/upload-artifact@v4
        with:
          name: practice-screenshot
          path: practice_screen.png
          retention-days: 14

  publish-release:
    name: Publish release to GitHub
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release AAB
        uses: actions/download-artifact@v4
        with:
          name: app-release-aab
          path: release

      - name: Upload AAB to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/app-release.aab
