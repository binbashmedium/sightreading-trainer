name: CI

permissions:
  contents: read

on:
  push:
    branches: ["**"]
  pull_request:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Override Java home for Gradle
        run: echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties

      - name: Run domain unit tests
        run: ./gradlew :domain:test --no-daemon

      - name: Run app unit tests
        run: ./gradlew :app:test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            domain/build/reports/tests/
            app/build/reports/tests/
          retention-days: 14

  practice-screenshot:
    name: Capture Practice Screen screenshot (emulator)
    needs: build-debug
    runs-on: ubuntu-latest
    continue-on-error: true  # emulator flakiness must not block release
    steps:
      - uses: actions/checkout@v4

      - name: Download app APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug
          path: apks

      - name: Download test APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug-androidTest
          path: apks

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run practice screenshot test on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: pixel_5
          disable-animations: true
          script: |
            adb install -r apks/app-debug.apk
            adb install -r apks/app-debug-androidTest.apk
            adb shell am instrument -w -e class com.binbashmedium.sightreadingtrainer.ui.PracticeScreenshotTest com.binbashmedium.sightreadingtrainer.test/androidx.test.runner.AndroidJUnitRunner
            adb pull /sdcard/practice_screen.png practice_screen.png

      - name: Upload practice screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: practice-screenshot
          path: practice_screen.png
          retention-days: 14

  build-debug:
    name: Build debug APK
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Override Java home for Gradle
        run: echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties

      - name: Build debug APK + test APK
        run: ./gradlew :app:assembleDebug :app:assembleDebugAndroidTest --no-daemon

      - name: Upload debug APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload debug test APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-androidTest
          path: app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk
          retention-days: 14

  release-apk:
    name: Upload APK to release
    if: github.event_name == 'release'
    needs: [test, practice-screenshot]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Override Java home for Gradle
        run: echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Download practice screenshot (emulator)
        continue-on-error: true  # practice-screenshot may have failed
        uses: actions/download-artifact@v4
        with:
          name: practice-screenshot
          path: release-screenshots/practice/

      - name: Upload APK and screenshots to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            release-screenshots/practice/practice_screen.png
