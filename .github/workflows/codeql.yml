name: "CodeQL"

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        language: ["java-kotlin"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK components
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: manual

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Override Java home for Gradle
        run: echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties

      - name: Manual build for CodeQL
        run: ./gradlew clean :domain:compileKotlin :app:compileDebugKotlin --no-daemon --rerun-tasks --no-build-cache

      - name: Perform CodeQL Analysis (no SARIF upload)
        uses: github/codeql-action/analyze@v4
        with:
          upload: false
          output: sarif-results
          category: "/language:${{ matrix.language }}"

      - name: Upload CodeQL SARIF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: sarif-results/*.sarif
          if-no-files-found: error
          retention-days: 14
