name: Android Release Bundle

on:
  workflow_dispatch:

jobs:
  build-release-bundle:
    name: Build signed AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Restore upload keystore from Base64 secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Missing required secret: KEYSTORE_BASE64" >&2
            exit 1
          fi
          CLEANED_BASE64="$(printf '%s' "$KEYSTORE_BASE64" | tr -d '\r\n\t ')"
          printf '%s' "$CLEANED_BASE64" | base64 --decode > /tmp/upload-keystore.jks
          keytool -list -keystore /tmp/upload-keystore.jks -storepass "${{ secrets.KEYSTORE_PASSWORD }}" >/dev/null

      - name: Build release app bundle
        env:
          KEYSTORE_PATH: /tmp/upload-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew -Dorg.gradle.java.home="$JAVA_HOME" bundleRelease --no-daemon

      - name: Upload release AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14
