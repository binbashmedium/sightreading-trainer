name: Android Release Bundle

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release-bundle:
    name: Build signed AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Restore upload keystore from Base64 secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Missing required secret: KEYSTORE_BASE64" >&2
            exit 1
          fi
          if [ -z "$KEYSTORE_PASSWORD" ]; then
            echo "Missing required secret: KEYSTORE_PASSWORD" >&2
            exit 1
          fi
          if [ -z "$KEY_ALIAS" ]; then
            echo "Missing required secret: KEY_ALIAS" >&2
            exit 1
          fi
          python - <<'PY'
          import base64
          import binascii
          import os
          import pathlib
          import re
          import sys

          raw = os.environ["KEYSTORE_BASE64"]
          cleaned = re.sub(r"\s+", "", raw)
          try:
              decoded = base64.b64decode(cleaned, validate=False)
          except binascii.Error as exc:
              print(f"Invalid KEYSTORE_BASE64: {exc}", file=sys.stderr)
              sys.exit(1)
          if not decoded:
              print("Decoded keystore is empty", file=sys.stderr)
              sys.exit(1)
          pathlib.Path("/tmp/upload-keystore.jks").write_bytes(decoded)
          PY
          keytool -list -keystore /tmp/upload-keystore.jks -storepass "$KEYSTORE_PASSWORD" >/dev/null
          if ! keytool -list -keystore /tmp/upload-keystore.jks -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" >/dev/null 2>&1; then
            echo "Key alias '$KEY_ALIAS' not found in keystore. Available aliases:" >&2
            keytool -list -keystore /tmp/upload-keystore.jks -storepass "$KEYSTORE_PASSWORD" >&2
            exit 1
          fi

      - name: Build release app bundle
        env:
          KEYSTORE_PATH: /tmp/upload-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew -Dorg.gradle.java.home="$JAVA_HOME" bundleRelease --no-daemon

      - name: Build debug APK for emulator screenshots
        run: ./gradlew -Dorg.gradle.java.home="$JAVA_HOME" :app:assembleDebug --no-daemon

      - name: Generate emulator screenshots
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          script: |
            set -euo pipefail
            adb wait-for-device
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            adb shell monkey -p com.binbashmedium.sightreadingtrainer -c android.intent.category.LAUNCHER 1
            sleep 10
            mkdir -p fastlane/metadata/android/en-US/images/phoneScreenshots
            mkdir -p fastlane/metadata/android/de-DE/images/phoneScreenshots
            adb exec-out screencap -p > fastlane/metadata/android/en-US/images/phoneScreenshots/01-main.png
            cp fastlane/metadata/android/en-US/images/phoneScreenshots/01-main.png fastlane/metadata/android/de-DE/images/phoneScreenshots/01-main.png

      - name: Upload release AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14

      - name: Upload release screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-screenshots
          path: fastlane/metadata/android/*/images/phoneScreenshots/*.png
          if-no-files-found: error
          retention-days: 14
